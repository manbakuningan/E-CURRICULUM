<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sistem Administrasi Guru</title>

<style>
:root{
  --platinum-1:#f4f6f9; --platinum-2:#e8ecf3; --glass-bg: rgba(255,255,255,.55);
  --glass-border: rgba(255,255,255,.35); --accent:#3a5aff; --accent-2:#7b3aff;
  --ink:#1c2333; --muted:#6b7385; --success:#12b76a; --warn:#f79009; --danger:#f04438;
  --sidebar-w: 264px;
}
*{box-sizing:border-box}
body{
  font-family:'Plus Jakarta Sans',sans-serif; color:var(--ink);
  background: radial-gradient(1200px 600px at 10% -10%, #e6ecff 0%, transparent 60%),
              radial-gradient(1000px 500px at 110% 10%, #ffe6f6 0%, transparent 55%),
              linear-gradient(180deg, var(--platinum-1), var(--platinum-2));
  min-height:100vh;
}
.glass{
  background: var(--glass-bg); backdrop-filter: blur(18px) saturate(160%);
  -webkit-backdrop-filter: blur(18px) saturate(160%);
  border:1px solid var(--glass-border); border-radius:18px;
  box-shadow: 0 8px 32px rgba(30,40,80,.10);
}
/* ===== LOGIN ===== */
#loginScreen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:16px;}
.login-card{width:100%; max-width:400px; padding:40px 32px;}
.login-logo{width:64px; height:64px; border-radius:16px; object-fit:cover; background:#fff;}
.form-control, .form-select{
  background: rgba(255,255,255,.6); border:1px solid rgba(0,0,0,.08); border-radius:12px; padding:11px 14px;
}
.form-control:focus, .form-select:focus{ box-shadow:0 0 0 3px rgba(58,90,255,.15); border-color:var(--accent); }
.btn-accent{
  background:linear-gradient(135deg, var(--accent), var(--accent-2)); border:none; color:#fff; border-radius:12px;
  padding:11px; font-weight:600; letter-spacing:.2px;
}
.btn-accent:hover{ filter:brightness(1.08); color:#fff; }

/* ===== APP LAYOUT ===== */
#appScreen{display:none;}
.sidebar{
  position:fixed; top:0; left:0; height:100vh; width:var(--sidebar-w); z-index:1030;
  padding:20px 14px; overflow-y:auto; border-radius:0 24px 24px 0;
  transition: transform .25s ease;
}
.sidebar-brand{display:flex; align-items:center; gap:10px; padding:8px 10px 20px;}
.sidebar-brand img{width:38px; height:38px; border-radius:10px; object-fit:cover; background:#fff;}
.sidebar-brand div{line-height:1.15;}
.nav-section{font-size:.68rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:16px 10px 6px;}
.nav-link-app{
  display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:12px; color:var(--ink);
  font-weight:500; font-size:.92rem; margin-bottom:3px; cursor:pointer; transition:.15s;
}
.nav-link-app i{width:18px; text-align:center; color:var(--muted);}
.nav-link-app:hover{ background:rgba(58,90,255,.08); }
.nav-link-app.active{ background:linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff; }
.nav-link-app.active i{ color:#fff; }

.main-wrap{ margin-left:var(--sidebar-w); min-height:100vh; padding:18px 22px 60px; transition:margin .25s ease;}
.topbar{ display:flex; align-items:center; justify-content:space-between; padding:12px 18px; margin-bottom:18px;}
.avatar{width:40px; height:40px; border-radius:50%; object-fit:cover; background:#fff; border:2px solid #fff;}
#sidebarOverlay{ position:fixed; inset:0; background:rgba(10,15,30,.35); z-index:1020; display:none; }
.burger{ display:none; }

.stat-card{ padding:20px; }
.stat-card .icon-badge{ width:46px; height:46px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; color:#fff;}
.stat-num{ font-size:1.7rem; font-weight:800; }
.progress{ height:8px; border-radius:6px; background:rgba(0,0,0,.06); }
.progress-bar{ border-radius:6px; }

.card-section{ padding:20px; margin-bottom:18px; }
.table thead th{ font-size:.75rem; text-transform:uppercase; color:var(--muted); border-bottom:2px solid rgba(0,0,0,.06); }
.table td, .table th{ vertical-align:middle; }
.badge-status{ padding:5px 10px; border-radius:8px; font-weight:600; font-size:.72rem; }
.btn-soft{ border-radius:10px; border:1px solid rgba(0,0,0,.08); background:rgba(255,255,255,.6); }
.section-title{ font-weight:700; font-size:1.05rem; margin-bottom:2px;}
.section-sub{ color:var(--muted); font-size:.85rem;}

@media (max-width: 991.98px){
  .sidebar{ transform: translateX(-100%); }
  .sidebar.show{ transform: translateX(0); }
  .main-wrap{ margin-left:0; padding:14px; }
  .burger{ display:inline-flex; }
}
.spinner-overlay{ position:fixed; inset:0; background:rgba(255,255,255,.55); backdrop-filter:blur(3px); z-index:2000; display:none; align-items:center; justify-content:center;}
.toast-container{ z-index:3000; }
.upload-drop{ border:2px dashed rgba(0,0,0,.15); border-radius:14px; padding:22px; text-align:center; cursor:pointer; background:rgba(255,255,255,.4);}
.upload-drop:hover{ border-color:var(--accent); }
.chip{ display:inline-block; padding:3px 10px; border-radius:20px; font-size:.72rem; font-weight:600;}

/* ===== KALENDER JADWAL (Google Calendar style) ===== */
.kal-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;margin-bottom:14px;}
.kal-toolbar .kal-filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.kal-wrap{overflow:auto;border-radius:14px;border:1px solid rgba(0,0,0,.06);background:rgba(255,255,255,.45);}
.kal-grid{display:grid;grid-template-columns:64px repeat(6,minmax(120px,1fr));min-width:760px;position:relative;}
.kal-cell{border-right:1px solid rgba(0,0,0,.05);border-bottom:1px solid rgba(0,0,0,.05);min-height:44px;position:relative;}
.kal-head{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);font-weight:700;font-size:.82rem;text-align:center;padding:8px 4px;border-bottom:2px solid rgba(58,90,255,.18);}
.kal-head.today{color:var(--accent);}
.kal-time{font-size:.68rem;color:var(--muted);text-align:right;padding:4px 6px 0 0;font-weight:600;position:sticky;left:0;background:rgba(255,255,255,.85);backdrop-filter:blur(4px);z-index:3;}
.kal-slot{position:absolute;left:3px;right:3px;border-radius:8px;padding:5px 7px;font-size:.72rem;color:#fff;overflow:hidden;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.12);transition:transform .12s;line-height:1.25;}
.kal-slot:hover{transform:scale(1.02);z-index:4;box-shadow:0 4px 14px rgba(0,0,0,.2);}
.kal-slot .kal-slot-mapel{font-weight:700;font-size:.76rem;}
.kal-slot .kal-slot-sub{opacity:.9;font-size:.66rem;}
.kal-slot.readonly{cursor:default;}
.kal-slot.readonly:hover{transform:none;box-shadow:0 2px 6px rgba(0,0,0,.12);}
.kal-empty-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--muted);opacity:0;transition:opacity .15s;}
.kal-cell:hover .kal-empty-hint{opacity:.6;}
.kal-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;font-size:.72rem;}
.kal-legend span{display:inline-flex;align-items:center;gap:4px;}
.kal-legend i{width:12px;height:12px;border-radius:3px;display:inline-block;}
@media (max-width:575.98px){.kal-grid{min-width:680px;}.kal-cell{min-height:38px;}}
.chip-toggle{cursor:pointer;}
.mapel-pill{display:inline-block;padding:3px 9px;border-radius:14px;font-size:.7rem;font-weight:600;margin:2px;background:rgba(58,90,255,.12);color:var(--accent);}
</style>
</head>
<body>

<!-- ============ LOADING ============ -->
<div class="spinner-overlay" id="spinnerOverlay">
  <div class="spinner-border" style="color:var(--accent); width:3rem; height:3rem;" role="status"></div>
</div>
<div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

<!-- ============ LOGIN SCREEN ============ -->
<div id="loginScreen">
  <div class="glass login-card text-center">
    <img id="loginLogo" src="https://placehold.co/64x64?text=Logo" class="login-logo mb-3" alt="Logo">
    <h5 class="fw-bold mb-0" id="loginSchoolName">Sistem Administrasi Guru</h5>
    <p class="section-sub mb-4">Silakan masuk untuk melanjutkan</p>
    <form id="formLogin" class="text-start">
      <label class="form-label small fw-semibold">Username</label>

      <label class="form-label small fw-semibold">Password</label>

      <div class="text-danger small mt-2" id="loginError"></div>
    </form>
  </div>
</div>

<!-- ============ APP SCREEN ============ -->
<div id="appScreen">
  <div id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

  <nav class="sidebar glass" id="sidebar">
    <div class="sidebar-brand">
      <img id="sbLogo" src="https://placehold.co/38x38" alt="logo">
      <div>
        <div class="fw-bold small" id="sbSchoolName">Sekolah</div>
        <div class="section-sub" style="font-size:.72rem;" id="sbTapel">Tahun Ajaran</div>
      </div>
    </div>

    <div id="navMenu"></div>
  </nav>

  <div class="main-wrap" id="mainWrap">
    <div class="topbar glass">
      <div class="d-flex align-items-center gap-2">
        <button class="btn burger btn-soft" onclick="toggleSidebar(true)"><i class="fa-solid fa-bars"></i></button>
        <div>
          <div class="fw-bold" id="pageTitle">Dashboard</div>
          <div class="section-sub" id="pageSub">Ringkasan sistem</div>
        </div>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="chip" id="onlineChip" style="background:#12b76a20; color:#12b76a;"><i class="fa-solid fa-circle" style="font-size:6px;"></i> Online</span>
        <button class="btn btn-soft btn-sm" onclick="syncAllTables()" title="Sinkronkan data"><i class="fa-solid fa-arrows-rotate"></i></button>
        <img class="avatar" id="topAvatar" src="https://placehold.co/40x40" alt="avatar">
        <div class="d-none d-sm-block me-2">
          <div class="fw-semibold small" id="topUserName">-</div>
          <div class="section-sub" style="font-size:.72rem;" id="topUserRole">-</div>
        </div>
        <button class="btn btn-soft btn-sm" onclick="logout()"><i class="fa-solid fa-power-off"></i></button>
      </div>
    </div>

    <div id="pageContent"></div>
  </div>
</div>

<script>
/*************************************************************
 * KONFIGURASI API
 *************************************************************/
const API_URL = "https://script.google.com/macros/s/AKfycbyDzn5BkxxMDkM_6SSSu2rSZX9Di7QUIQhEt_Gw_NDtoTvkbUp4brVn9-Wwm4uvYyTi0g/exec"; // <-- Ganti dengan URL Web App hasil deploy Kode.gs

let STATE = {
  token: localStorage.getItem('sag_token') || null,
  user: JSON.parse(localStorage.getItem('sag_user') || 'null'),
  config: {},
  currentPage: 'dashboard',
  isOnline: navigator.onLine
};

/*************************************************************
 * OFFLINE-FIRST DATA STORE (localStorage)
 * Semua tabel disimpan lokal. Baca selalu dari local dulu (instan),
 * lalu sync ke server di background dan update local store.
 * Kalau ada perubahan manual di Google Sheet, akan kebaca saat sync berikutnya.
 *************************************************************/
const DB_PREFIX = 'sag_db_';
function dbGet(table) {
  try { return JSON.parse(localStorage.getItem(DB_PREFIX + table) || '[]'); }
  catch (e) { return []; }
}
function dbSet(table, rows) {
  try { localStorage.setItem(DB_PREFIX + table, JSON.stringify(rows)); } catch (e) { /* storage penuh, abaikan */ }
}
function dbUpsert(table, row) {
  const rows = dbGet(table);
  const idx = rows.findIndex(r => r.id === row.id);
  if (idx === -1) rows.push(row); else rows[idx] = row;
  dbSet(table, rows);
}
function dbDelete(table, id) {
  dbSet(table, dbGet(table).filter(r => r.id !== id));
}

// Helper: ambil nama mapel dari array mapelIds
function getStateMapelNama(mapelIds) {
  if (!mapelIds) return [];
  const ids = Array.isArray(mapelIds) ? mapelIds : String(mapelIds).split(',').map(s => s.trim()).filter(Boolean);
  const mapelList = getData('Mapel');
  return ids.map(id => {
    const m = mapelList.find(x => x.id === id);
    return m ? m.namaMapel : id;
  }).filter(Boolean);
}
// Helper: ambil nama kelas dari kelasId
function getKelasNama(kelasId) {
  const k = getData('Kelas').find(x => x.id === kelasId);
  return k ? k.namaKelas : (kelasId || '-');
}
// Helper: ambil nama mapel dari mapelId tunggal
function getMapelNama(mapelId) {
  const m = getData('Mapel').find(x => x.id === mapelId);
  return m ? m.namaMapel : (mapelId || '-');
}
// Helper: ambil nama guru dari guruId
function getGuruNama(guruId) {
  const u = getData('Users').find(x => x.id === guruId);
  return u ? u.nama : (guruId || '-');
}
// Helper: dapatkan warna mapel untuk kalender (hash sederhana)
function getMapelColor(mapelId) {
  const palette = ['#3a5aff','#7b3aff','#12b76a','#f79009','#f04438','#0891b2','#db2777','#9333ea','#0d9488','#ea580c','#4f46e5','#16a34a'];
  if (!mapelId) return '#6b7385';
  let hash = 0;
  for (let i = 0; i < String(mapelId).length; i++) hash = String(mapelId).charCodeAt(i) + ((hash << 5) - hash);
  return palette[Math.abs(hash) % palette.length];
}


// Ambil data: instan dari local, lalu refresh diam-diam dari server (kalau online)
function getData(table, filterFn) {
  const local = dbGet(table);
  syncTable(table); // background, tidak di-await oleh pemanggil
  return filterFn ? local.filter(filterFn) : local;
}

async function syncTable(table) {
  if (!navigator.onLine) return;
  const res = await apiCall('getAll', { table }, true);
  if (res.success) {
    dbSet(table, res.data);
    // Kalau lagi ada di halaman yg pakai tabel ini, refresh tampilan diam-diam
    if (STATE._syncRefreshPages && STATE._syncRefreshPages[table] === STATE.currentPage) {
      navigate(STATE.currentPage);
    }
  }
}

async function syncAllTables() {
  const tables = ['Config','Users','Kelas','Mapel','DataSiswa','Absensi','Nilai','Agenda','BimbinganWali','JadwalMengajar','PerangkatAjar','PanduanMengajar'];
  showToast(navigator.onLine ? 'Menyinkronkan data...' : 'Offline - pakai data tersimpan', navigator.onLine ? 'primary' : 'warning');
  for (const t of tables) { await syncTable(t); }
  showToast('Data tersinkron.', 'success');
  await loadConfig();
  navigate(STATE.currentPage);
}

window.addEventListener('online', () => { STATE.isOnline = true; updateOnlineChip(); showToast('Kembali online, menyinkronkan...', 'success'); syncAllTables(); });
window.addEventListener('offline', () => { STATE.isOnline = false; updateOnlineChip(); showToast('Mode offline - perubahan akan disinkron saat online kembali.', 'warning'); });
function updateOnlineChip() {
  const el = document.getElementById('onlineChip'); if (!el) return;
  el.style.background = STATE.isOnline ? '#12b76a20' : '#f0443820';
  el.style.color = STATE.isOnline ? '#12b76a' : '#f04438';
  el.innerHTML = `<i class="fa-solid fa-circle" style="font-size:6px;"></i> ${STATE.isOnline ? 'Online' : 'Offline'}`;
}

/*************************************************************
 * HTTP HELPER
 *************************************************************/
async function apiCall(action, payload = {}, silent = false) {
  if (!silent) showSpinner(true);
  try {
    const body = Object.assign({ action, token: STATE.token }, payload);
    const res = await fetch(API_URL, {
      method: 'POST', // GAS doPost menangani semua; method GET juga didukung via query jika perlu
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // hindari preflight CORS
      body: JSON.stringify(body)
    });
    const json = await res.json();
    if (!json.success) {
      showToast(json.message || 'Terjadi kesalahan.', 'danger');
    }
    return json;
  } catch (err) {
    showToast('Gagal terhubung ke server: ' + err.message, 'danger');
    return { success: false, message: err.message };
  } finally {
    if (!silent) showSpinner(false);
  }
}

function showSpinner(show) {
  document.getElementById('spinnerOverlay').style.display = show ? 'flex' : 'none';
}
function showToast(msg, type = 'primary') {
  const id = 't' + Date.now();
  const html = `<div id="${id}" class="toast align-items-center text-bg-${type} border-0" role="alert">
    <div class="d-flex"><div class="toast-body">${msg}</div>
    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`;
  document.getElementById('toastContainer').insertAdjacentHTML('beforeend', html);
  const el = new bootstrap.Toast(document.getElementById(id), { delay: 3500 });
  el.show();
}

/*************************************************************
 * AUTH
 *************************************************************/
document.getElementById('formLogin').addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById('loginError').textContent = '';
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const res = await apiCall('login', { username, password });
  if (res.success) {
    STATE.token = res.token; STATE.user = res.user;
    localStorage.setItem('sag_token', res.token);
    localStorage.setItem('sag_user', JSON.stringify(res.user));
    await bootApp();
  } else {
    document.getElementById('loginError').textContent = res.message;
  }
});

function logout() {
  localStorage.removeItem('sag_token'); localStorage.removeItem('sag_user');
  STATE.token = null; STATE.user = null;
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

async function loadConfig() {
  const local = getData('Config'); // instan dari local, sync jalan di background lewat getData()
  if (local.length) {
    const cfg = {};
    local.forEach(r => cfg[r.key] = r.value);
    STATE.config = cfg;
    const logo = cfg.logoUrl || 'https://placehold.co/64x64?text=Logo';
    document.getElementById('loginLogo').src = logo;
    document.getElementById('loginSchoolName').textContent = cfg.namaSekolah || 'Sistem Administrasi Guru';
    document.getElementById('sbLogo').src = logo;
    document.getElementById('sbSchoolName').textContent = cfg.namaSekolah || '-';
    document.getElementById('sbTapel').textContent = (cfg.tapelAktif || '-') + ' • ' + (cfg.semesterAktif || '-');
  }
}

/*************************************************************
 * BOOT
 *************************************************************/
window.addEventListener('DOMContentLoaded', async () => {
  if (STATE.token && STATE.user) {
    document.getElementById('loginScreen').style.display = 'none';
    await bootApp();
  }
});

async function bootApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';

  // Render UI langsung pakai data lokal dulu (instan), config & dashboard nyusul di background
  document.getElementById('topUserName').textContent = STATE.user.nama;
  document.getElementById('topUserRole').textContent = STATE.user.role;
  renderMenu();
  updateOnlineChip();
  navigate('dashboard');

  await loadConfig();
  document.getElementById('topAvatar').src = STATE.config.logoUrl || 'https://placehold.co/40x40';

  if (navigator.onLine) syncAllTables();
}

// Daftarkan service worker supaya app shell (HTML/CSS/JS) bisa dibuka tanpa internet
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => { /* sw.js opsional, abaikan kalau tidak ada */ });
  });
}

/*************************************************************
 * SIDEBAR / MENU
 *************************************************************/
const MENU_COMMON_TOP = [
  { id: 'dashboard', label: 'Dashboard', icon: 'fa-gauge-high' },
];
const MENU_GURU = [
  { section: 'Menu Guru' },
  { id: 'absensi', label: 'Input Absensi', icon: 'fa-clipboard-check' },
  { id: 'nilai', label: 'Input Penilaian', icon: 'fa-marker' },
  { id: 'jadwal', label: 'Jadwal Mengajar', icon: 'fa-calendar-days' },
  { id: 'agenda', label: 'Jurnal Agenda', icon: 'fa-book-open' },
  { id: 'perangkat', label: 'E-Perangkat Ajar', icon: 'fa-file-arrow-up' },
  { id: 'panduan', label: 'Panduan Mengajar', icon: 'fa-book' },
];
const MENU_ADMIN = [
  { section: 'Menu Admin' },
  { id: 'rekapWali', label: 'Rekap Guru Wali', icon: 'fa-people-roof' },
  { id: 'manajemenSiswa', label: 'Manajemen Data Siswa', icon: 'fa-user-graduate' },
  { id: 'manajemenGuru', label: 'Manajemen Data Guru', icon: 'fa-chalkboard-user' },
  { id: 'manajemenKelas', label: 'Manajemen Kelas', icon: 'fa-school' },
  { id: 'manajemenMapel', label: 'Manajemen Mapel', icon: 'fa-book-open-reader' },
  { id: 'manajemenJadwal', label: 'Manajemen Jadwal', icon: 'fa-calendar-week' },
  { id: 'panduan', label: 'Panduan Pembelajaran', icon: 'fa-book' },

async function renderDashboardAdmin() {
  const kelas = getData('Kelas');

  const jenisWajib = ['Silabus', 'ATP', 'Prota', 'Promes', 'Modul Ajar/RPP', 'KKTP'];

  const kelengkapan = guruList.map(g => {
    const milikGuru = perangkat.filter(p => p.guruId === g.id);
    const jenisTerisi = jenisWajib.filter(j => milikGuru.some(p => p.jenis === j && p.status !== 'Ditolak'));
    const persentase = Math.round((jenisTerisi.length / jenisWajib.length) * 100);
    return { nama: g.nama, persentase, terisi: jenisTerisi.length, total: jenisWajib.length };

  const rataRata = kelengkapan.length ? Math.round(kelengkapan.reduce((a,b) => a+b.persentase, 0) / kelengkapan.length) : 0;

  document.getElementById('pageContent').innerHTML = `

/*************************************************************
 * ANTRIAN OFFLINE (untuk create/update/delete saat tidak ada koneksi)
 *************************************************************/
function getQueue() { try { return JSON.parse(localStorage.getItem('sag_queue') || '[]'); } catch (e) { return []; } }
function setQueue(q) { localStorage.setItem('sag_queue', JSON.stringify(q)); }
function queueAction(action, payload) {
  const q = getQueue(); q.push({ action, payload, time: Date.now() }); setQueue(q);
}
async function processQueue() {
  if (!navigator.onLine) return;
  let q = getQueue();
  if (!q.length) return;
  showToast('Mengirim ' + q.length + ' perubahan tertunda...', 'primary');
  while (q.length) {
    const item = q.shift();
    await apiCall(item.action, item.payload, true);
    setQueue(q);
  }
  showToast('Semua perubahan tersinkron.', 'success');
  syncAllTables();
}
window.addEventListener('online', processQueue);

// Simpan/hapus data: langsung update local store (instan) + kirim ke server (atau antri kalau offline)
async function writeData(action, table, data, id) {
  if (action === 'create' || action === 'update') {
    if (!data.id) data.id = id || (table.substring(0,3).toUpperCase() + '-' + Date.now());
    dbUpsert(table, data);
  }
  if (action === 'delete') dbDelete(table, id);

  if (navigator.onLine) {
    await apiCall(action, action === 'delete' ? { table, id } : { table, data }, true);
  } else {
    queueAction(action, action === 'delete' ? { table, id } : { table, data });
  }
}

async function renderGenericTable(table, columns) {
  const isGuru = STATE.user.role === 'Guru';
  const rows = getData(table, isGuru ? (r => r.guruId === STATE.user.id) : null);

  const theadHtml = columns.map(c => `<th>${c.label}</th>`).join('') + '<th></th>';
  const tbodyHtml = rows.map(r => `<tr>${columns.map(c => `<td>${r[c.key] ?? '-'}</td>`).join('')}
    <td class="text-end"><button class="btn btn-sm btn-soft" onclick='openForm("${table}", ${JSON.stringify(columns).replace(/'/g,"&#39;")}, ${JSON.stringify(r).replace(/'/g,"&#39;")})'><i class="fa-solid fa-pen"></i></button>
    <button class="btn btn-sm btn-soft text-danger" onclick="deleteRow('${table}','${r.id}')"><i class="fa-solid fa-trash"></i></button></td></tr>`).join('')
    || `<tr><td colspan="${columns.length+1}" class="text-center section-sub py-4">Belum ada data.</td></tr>`;

  document.getElementById('pageContent').innerHTML = `
    <div class="glass card-section">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="section-title">Data ${table}</div>

      </div>
      <div class="table-responsive"><table class="table align-middle">
        <thead><tr>${theadHtml}</tr></thead><tbody>${tbodyHtml}</tbody>
      </table></div>
    </div>`;
}

function openForm(table, columns, existing) {
  const isEdit = !!existing;
  const fields = columns.map(c => {
    const inputType = c.key === 'tanggal' ? 'date' : 'text';
    return `
    <div class="mb-2">
      <label class="form-label small fw-semibold">${c.label}</label>
      <input type="${inputType}" class="form-control form-control-sm" id="f_${c.key}" value="${isEdit ? (existing[c.key] ?? '') : ''}">
    </div>`;
  }).join('');

  const modalHtml = `
  <div class="modal fade" id="dynModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content glass">
      <div class="modal-header"><h6 class="modal-title">${isEdit ? 'Edit' : 'Tambah'} Data</h6>
      <button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">${fields}</div>
      <div class="modal-footer"><button class="btn btn-accent btn-sm" onclick='submitForm("${table}", ${JSON.stringify(columns).replace(/'/g,"&#39;")}, ${isEdit ? `"${existing.id}"` : 'null'})'>Simpan</button></div>
    </div></div>
  </div>`;
  document.getElementById('dynModalHolder')?.remove();
  const holder = document.createElement('div'); holder.id = 'dynModalHolder'; holder.innerHTML = modalHtml;
  document.body.appendChild(holder);
  new bootstrap.Modal(document.getElementById('dynModal')).show();
}

async function submitForm(table, columns, id) {
  const data = {};
  if (id) data.id = id;
  // Untuk tabel yang punya konsep guruId (Agenda, BimbinganWali, dll), set otomatis untuk guru
  if (STATE.user.role === 'Guru' && ['Agenda','BimbinganWali','JadwalMengajar','PerangkatAjar'].includes(table)) {
    data.guruId = STATE.user.id;
  }
  columns.forEach(c => data[c.key] = document.getElementById('f_' + c.key).value);

  bootstrap.Modal.getInstance(document.getElementById('dynModal')).hide();
  await writeData(id ? 'update' : 'create', table, data, id);
  showToast('Data tersimpan.', 'success');
  navigate(STATE.currentPage);
}

async function deleteRow(table, id) {
  if (!confirm('Yakin ingin menghapus data ini?')) return;
  await writeData('delete', table, null, id);
  showToast('Data dihapus.', 'success');
  navigate(STATE.currentPage);
}

function printLeger() {

    const kolom = window._legerData.kolomPenilaian;

    const body = window._legerData.leger.map(r => [r.nis, r.nama, ...kolom.map(k => r.nilai[k] ?? '-'), r.rataRata]);

const JENIS_PERANGKAT = ['Silabus', 'ATP', 'Prota', 'Promes', 'Modul Ajar/RPP', 'KKTP'];

async function renderPerangkat() {
  const isGuru = STATE.user.role === 'Guru';
  const rows = getData('PerangkatAjar', isGuru ? (r => r.guruId === STATE.user.id) : null);

  const cardsHtml = JENIS_PERANGKAT.map(jenis => {
    const found = rows.find(r => r.jenis === jenis && r.status !== 'Ditolak');
    const statusChip = found
      ? `<span class="chip" style="background:${statusColor(found.status)}20; color:${statusColor(found.status)}">${found.status}</span>`
      : `<span class="chip bg-secondary-subtle text-secondary">Belum Upload</span>`;
    return `<div class="col-md-4">
      <div class="glass p-3 h-100">
        <div class="d-flex justify-content-between align-items-start mb-2">
          <div class="fw-semibold">${jenis}</div>${statusChip}
        </div>
        ${found ? `<a href="${found.fileUrl}" target="_blank" class="small d-block mb-2"><i class="fa-solid fa-file-pdf text-danger me-1"></i>${found.namaFile}</a>
        ${found.catatanRevisi ? `<div class="small text-danger mb-2"><i class="fa-solid fa-triangle-exclamation me-1"></i>${found.catatanRevisi}</div>` : ''}` : '<p class="section-sub small">Belum ada dokumen.</p>'}
        <button class="btn btn-soft btn-sm w-100" onclick="openUploadPerangkat('${jenis}')"><i class="fa-solid fa-upload me-1"></i>${found ? 'Upload Ulang' : 'Upload'}</button>
      </div></div>`;
  }).join('');

  document.getElementById('pageContent').innerHTML = `<div class="row g-3">${cardsHtml}</div>`;
}
function statusColor(status) {
  if (status === 'Disetujui') return '#12b76a';
  if (status === 'Revisi') return '#f79009';
  if (status === 'Ditolak') return '#f04438';
  return '#6b7385';
}

function openUploadPerangkat(jenis) {
  const modalHtml = `
  <div class="modal fade" id="uploadModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content glass">
      <div class="modal-header"><h6 class="modal-title">Upload ${jenis}</h6><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div class="upload-drop" onclick="document.getElementById('fileInput').click()">
          <i class="fa-solid fa-cloud-arrow-up fa-2x mb-2" style="color:var(--accent)"></i>
          <p class="mb-0 small">Klik untuk memilih file PDF</p>
          <p class="small text-muted mb-0" id="fileNameLabel"></p>
        </div>
        <input type="file" id="fileInput" accept="application/pdf" class="d-none" onchange="document.getElementById('fileNameLabel').textContent=this.files[0]?.name || ''">
      </div>
      <div class="modal-footer"><button class="btn btn-accent btn-sm" onclick="submitUploadPerangkat('${jenis}')">Upload</button></div>
    </div></div>
  </div>`;
  document.getElementById('uploadModalHolder')?.remove();
  const holder = document.createElement('div'); holder.id = 'uploadModalHolder'; holder.innerHTML = modalHtml;
  document.body.appendChild(holder);
  new bootstrap.Modal(document.getElementById('uploadModal')).show();
}

async function submitUploadPerangkat(jenis) {
  const file = document.getElementById('fileInput').files[0];
  if (!file) { showToast('Pilih file terlebih dahulu.', 'warning'); return; }
  const base64 = await fileToBase64(file);
  const res = await apiCall('uploadFile', {
    table: 'PerangkatAjar', fileData: base64, fileName: file.name, mimeType: file.type,
    data: { guruId: STATE.user.id, jenis, tapel: STATE.config.tapelAktif || '' }
  });
  if (res.success) {
    showToast('Berhasil diupload.', 'success');
    bootstrap.Modal.getInstance(document.getElementById('uploadModal')).hide();
    renderPerangkat();
  }
}
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function submitFormGuru(id) {

async function simpanProfil() {
  const pwBaru = document.getElementById('profilPasswordBaru').value;
  const pwKonfirmasi = document.getElementById('profilPasswordKonfirmasi').value;
  if (pwBaru && pwBaru !== pwKonfirmasi) { showToast('Konfirmasi password tidak cocok.', 'danger'); return; }

  const data = {
    id: STATE.user.id,
    nama: document.getElementById('profilNama').value,
    noHp: document.getElementById('profilNoHp').value,
    nip: document.getElementById('profilNip').value
  };
  if (pwBaru) data.password = pwBaru;

  const file = document.getElementById('profilFoto').files[0];
  let res;
  if (file) {
    const base64 = await fileToBase64(file);
    res = await apiCall('uploadFile', { table: 'Users', fileData: base64, fileName: file.name, mimeType: file.type, fileField: 'fotoUrl', data });
  } else {
    res = await apiCall('update', { table: 'Users', data });
  }
  if (res.success) {
    Object.assign(STATE.user, data);
    if (res.fotoUrl) STATE.user.fotoUrl = res.fotoUrl;
    delete STATE.user.password;
    localStorage.setItem('sag_user', JSON.stringify(STATE.user));

    if (STATE.user.fotoUrl) document.getElementById('topAvatar').src = STATE.user.fotoUrl;

/*************************************************************
 * KALENDER JADWAL (Google Calendar style, slot-based)
 * - Admin (isAdmin=true): lihat semua jadwal, bisa tambah/edit/hapus
 * - Guru (isAdmin=false): lihat jadwal dirinya saja, read-only
 *************************************************************/
const KAL_DAYS = ['Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const KAL_START = 7 * 60;   // 07:00 dalam menit
const KAL_END   = 15 * 60;  // 15:00 dalam menit
const KAL_SLOT  = 30;       // 30 menit per slot

function timeToMin(t) {
  if (!t) return null;
  const parts = String(t).split(':');
  if (parts.length < 2) return null;
  return (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0);
}
function minToLabel(min) {
  const h = Math.floor(min / 60), m = min % 60;
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
}

  let rows = st.jadwalRows;

  // Apply filters for admin
  if (isAdmin) {
    const fk = document.getElementById('kalFilterKelas')?.value;
    const fg = document.getElementById('kalFilterGuru')?.value;
    if (fk) rows = rows.filter(j => j.kelasId === fk);
    if (fg) rows = rows.filter(j => j.guruId === fg);
  }

  const totalSlots = (KAL_END - KAL_START) / KAL_SLOT; // 16 slots
  const today = new Date().getDay(); // 0=Min, 1=Sen, ...
  const todayIdx = today === 0 ? -1 : today - 1; // index 0-5 untuk Sen-Sab

  // Build header row
  let html = `<div class="kal-wrap"><div class="kal-grid">
    <div class="kal-head" style="background:rgba(255,255,255,.85);border-right:2px solid rgba(58,90,255,.18);"></div>`;
  KAL_DAYS.forEach((d, i) => {
    html += `<div class="kal-head ${i === todayIdx ? 'today' : ''}">${d}${i === todayIdx ? '<div class="section-sub" style="font-size:.6rem;font-weight:400;">Hari ini</div>' : ''}</div>`;
  });

  // Build time rows + slot cells
  for (let s = 0; s < totalSlots; s++) {
    const min = KAL_START + s * KAL_SLOT;
    const nextMin = min + KAL_SLOT;
    const label = minToLabel(min);
    html += `<div class="kal-time">${label}</div>`;

    for (let d = 0; d < KAL_DAYS.length; d++) {
      html += `<div class="kal-cell" data-day="${d}" data-min="${min}">`;

      // Cari jadwal yang mulai tepat di slot ini
      const slotStart = min;
      const blocks = rows.filter(j => {
        if (KAL_DAYS.indexOf(j.hari) !== d) return false;
        const jStart = timeToMin(j.jamMulai);
        if (jStart === null) return false;
        // Snap start time down to nearest slot boundary
        const jStartSlot = Math.floor((jStart - KAL_START) / KAL_SLOT) * KAL_SLOT + KAL_START;
        return jStartSlot === slotStart;
      });

      blocks.forEach(j => {
        const jStartRaw = timeToMin(j.jamMulai) || KAL_START;
        const jEndRaw = timeToMin(j.jamSelesai) || (jStartRaw + KAL_SLOT);
        // Snap start down, end up to slot boundaries
        const jStartSlot = Math.floor((jStartRaw - KAL_START) / KAL_SLOT) * KAL_SLOT + KAL_START;
        const jEndSlot = Math.ceil((jEndRaw - KAL_START) / KAL_SLOT) * KAL_SLOT + KAL_START;
        const spanSlots = Math.max(1, (jEndSlot - jStartSlot) / KAL_SLOT);
        const mapelNama = getMapelNama(j.mapelId);
        const kelasNama = getKelasNama(j.kelasId);
        const guruNama = getGuruNama(j.guruId);
        const color = getMapelColor(j.mapelId);
        const subLine = isAdmin
          ? `${kelasNama} · ${guruNama}`
          : `${kelasNama} · ${j.jamMulai || ''}-${j.jamSelesai || ''}`;
        const clickAttr = isAdmin
          ? `onclick="openFormJadwal(${JSON.stringify(j).replace(/'/g,'&#39;').replace(/"/g,'&quot;')}, true)"`
          : '';
        const roClass = isAdmin ? '' : 'readonly';
        html += `<div class="kal-slot ${roClass}" style="height:calc(${spanSlots} * 44px + ${(spanSlots-1)} * 1px - 6px);background:${color};" ${clickAttr}>
          <div class="kal-slot-mapel">${mapelNama}${j.jamKe ? ' (Jam ' + j.jamKe + ')' : ''}</div>
          <div class="kal-slot-sub">${subLine}</div>
        </div>`;
      });

      // Empty hint for admin (click to add)
      if (isAdmin && blocks.length === 0) {
        html += `<div class="kal-empty-hint" onclick="openFormJadwalAt(${d}, ${min}, true)"><i class="fa-solid fa-plus"></i></div>`;
      }

      html += `</div>`;
    }
  }

  html += `</div></div>`;

  // Summary stats
  const totalJadwal = rows.length;
  const summary = isAdmin
    ? `<div class="d-flex justify-content-between align-items-center mt-2">
        <span class="section-sub small">Total: <strong>${totalJadwal}</strong> jadwal ditampilkan. Klik slot kosong untuk menambah, klik blok untuk edit.</span>
      </div>`
    : `<div class="d-flex justify-content-between align-items-center mt-2">
        <span class="section-sub small">Total: <strong>${totalJadwal}</strong> jadwal mengajar Anda minggu ini.</span>
      </div>`;
  html = summary + html;

  document.getElementById('kalGridHolder').innerHTML = html;
}

function openFormJadwalAt(dayIdx, min, isAdmin) {
  if (!isAdmin) return;
  const hari = KAL_DAYS[dayIdx];
  const jamMulai = minToLabel(min);
  const jamSelesai = minToLabel(min + KAL_SLOT);
  openFormJadwal({ hari, jamMulai, jamSelesai }, true);
}

function openFormJadwal(existing, isAdmin) {
  if (!isAdmin) { showToast('Anda tidak dapat mengedit jadwal (read-only).', 'warning'); return; }
  const isEdit = !!existing && !!existing.id;
  const kelasList = window._kalState?.kelasList || getData('Kelas');
  const mapelList = window._kalState?.mapelList || getData('Mapel');
  const guruList  = (window._kalState?.guruList || getData('Users')).filter(u => u.role === 'Guru');

  const modalHtml = `<div class="modal fade" id="jadwalModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content glass">
    <div class="modal-header"><h6 class="modal-title">${isEdit ? 'Edit' : 'Tambah'} Jadwal Pelajaran</h6><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="row g-2">
        <div class="col-md-6">
          <label class="form-label small fw-semibold">Hari</label>
          <select class="form-select form-select-sm mb-2" id="jdHari">
            ${KAL_DAYS.map(d => `<option value="${d}" ${isEdit && existing.hari===d?'selected':''}>${d}</option>`).join('')}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-semibold">Jam Ke</label>
          <input class="form-control form-control-sm mb-2" id="jdJamKe" placeholder="Contoh: 1-2" value="${isEdit ? (existing.jamKe||'') : ''}">
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-semibold">Jam Mulai</label>
          <input type="time" class="form-control form-control-sm mb-2" id="jdMulai" value="${isEdit ? (existing.jamMulai||'07:00') : '07:00'}">
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-semibold">Jam Selesai</label>
          <input type="time" class="form-control form-control-sm mb-2" id="jdSelesai" value="${isEdit ? (existing.jamSelesai||'07:45') : '07:45'}">
        </div>
        <div class="col-md-12">
          <label class="form-label small fw-semibold">Kelas</label>
          <select class="form-select form-select-sm mb-2" id="jdKelas">
            ${kelasList.map(k => `<option value="${k.id}" ${isEdit && existing.kelasId===k.id?'selected':''}>${k.namaKelas}</option>`).join('')}
          </select>
        </div>
        <div class="col-md-12">
          <label class="form-label small fw-semibold">Mata Pelajaran</label>
          <select class="form-select form-select-sm mb-2" id="jdMapel">
            ${mapelList.map(m => `<option value="${m.id}" ${isEdit && existing.mapelId===m.id?'selected':''}>${m.namaMapel}${m.kodeMapel?' ('+m.kodeMapel+')':''}</option>`).join('')}
          </select>
        </div>
        <div class="col-md-12">
          <label class="form-label small fw-semibold">Guru Pengampu</label>
          <select class="form-select form-select-sm" id="jdGuru">
            ${guruList.map(g => `<option value="${g.id}" ${isEdit && existing.guruId===g.id?'selected':''}>${g.nama}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      ${isEdit ? `<button class="btn btn-soft btn-sm text-danger me-auto" onclick="deleteRow('JadwalMengajar','${existing.id}');bootstrap.Modal.getInstance(document.getElementById('jadwalModal')).hide();"><i class="fa-solid fa-trash me-1"></i>Hapus</button>` : ''}
      <button class="btn btn-accent btn-sm" onclick='submitFormJadwal(${isEdit ? `"${existing.id}"` : 'null'})'>Simpan</button>
    </div>
  </div></div></div>`;
  document.getElementById('jadwalModalHolder')?.remove();
  const holder = document.createElement('div'); holder.id = 'jadwalModalHolder'; holder.innerHTML = modalHtml;
  document.body.appendChild(holder);
  new bootstrap.Modal(document.getElementById('jadwalModal')).show();
}

async function submitFormJadwal(id) {
  const mulai = document.getElementById('jdMulai').value;
  const selesai = document.getElementById('jdSelesai').value;
  if (mulai && selesai && mulai >= selesai) {
    showToast('Jam selesai harus setelah jam mulai.', 'danger');
    return;
  }
  const data = {
    hari: document.getElementById('jdHari').value,
    jamKe: document.getElementById('jdJamKe').value,
    jamMulai: mulai,
    jamSelesai: selesai,
    kelasId: document.getElementById('jdKelas').value,
    mapelId: document.getElementById('jdMapel').value,
    guruId: document.getElementById('jdGuru').value
  };
  if (id) data.id = id;
  bootstrap.Modal.getInstance(document.getElementById('jadwalModal')).hide();
  await writeData(id ? 'update' : 'create', 'JadwalMengajar', data, id);
  showToast('Jadwal tersimpan.', 'success');
  // Refresh data & re-render
  await syncTable('JadwalMengajar');
  renderKalenderJadwal(window._kalState?.isAdmin || STATE.user.role === 'Admin');
}

/*************************************************************
 * PDF UTILITIES (KOP SURAT, TTD, BARCODE)
 *************************************************************/
async function printWithHeader(label, fn) {
  try { await fn(); } catch (err) { showToast('Gagal membuat PDF: ' + err.message, 'danger'); }
}
// Ambil logo sekolah sebagai base64 (dicache di STATE._logoBase64), supaya bisa dipasang di kop PDF.
// Reset cache ini (STATE._logoBase64 = undefined) setiap kali logoUrl di Konfigurasi Sekolah diubah.
async function getLogoBase64() {
  const cfg = STATE.config;
  if (!cfg.logoUrl) return null;
  if (STATE._logoBase64 !== undefined) return STATE._logoBase64;
  try {
    const res = await fetch(cfg.logoUrl);
    const blob = await res.blob();
    STATE._logoBase64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  } catch (e) {
    STATE._logoBase64 = null; // gagal ambil logo (mis. CORS), lanjut tanpa logo
  }
  return STATE._logoBase64;
}
async function addKopSurat(doc, judul) {
  const cfg = STATE.config;
  const logoData = await getLogoBase64();

  // Logo di kiri (jika berhasil dimuat)
  if (logoData) {
    try { doc.addImage(logoData, 14, 10, 22, 22); } catch (e) { /* format logo tidak didukung, abaikan */ }
  }

  // Teks kop surat rata tengah (seperti kop resmi pada umumnya)
  doc.setFontSize(13); doc.setFont(undefined, 'bold');
  doc.text(cfg.namaSekolah || 'Nama Sekolah', 105, 16, { align: 'center' });
  doc.setFontSize(9); doc.setFont(undefined, 'normal');
  doc.text(cfg.alamatSekolah || '-', 105, 22, { align: 'center' });
  doc.text('NPSN: ' + (cfg.npsn || '-'), 105, 27, { align: 'center' });
  doc.setLineWidth(0.8); doc.line(14, 34, 196, 34);

  doc.setFontSize(12); doc.setFont(undefined, 'bold'); doc.text(judul, 105, 44, { align: 'center' });
  doc.setFontSize(9); doc.setFont(undefined, 'normal');
  doc.text('Tahun Ajaran: ' + (cfg.tapelAktif || '-') + '  |  Semester: ' + (cfg.semesterAktif || '-'), 105, 50, { align: 'center' });
}
function addTandaTanganDanBarcode(doc, code) {
  const cfg = STATE.config;
  const finalY = doc.lastAutoTable ? doc.lastAutoTable.finalY + 20 : 120;
  doc.setFontSize(9);
  doc.text('Kuningan, ' + new Date().toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' }), 140, finalY);
  doc.text('Mengetahui,', 140, finalY + 6);
  doc.text('Kepala Sekolah', 140, finalY + 12);
  doc.text(cfg.kepsekNama || '(.....................)', 140, finalY + 32);
  doc.text('NIP. ' + (cfg.kepsekNip || '-'), 140, finalY + 37);

  const canvas = document.createElement('canvas');
  try {
    JsBarcode(canvas, code, { format: 'CODE128', displayValue: false, height: 30 });
    const imgData = canvas.toDataURL('image/png');
    doc.addImage(imgData, 'PNG', 14, finalY, 45, 14);
    doc.setFontSize(7); doc.text(code, 14, finalY + 18);
  } catch (e) { /* barcode gagal, abaikan */ }
}

/*************************************************************
 * CETAK AGENDA (contoh tambahan pemakaian PDF generic table)
 *************************************************************/
async function printAgenda() {
  const rows = getData('Agenda', a => a.guruId === STATE.user.id);
  printWithHeader('Jurnal Agenda', async () => {
    const doc = new jspdf.jsPDF();
    await addKopSurat(doc, 'JURNAL AGENDA MENGAJAR');
    const body = rows.map(a => [a.tanggal, a.kelasId, a.mapelId, a.materi, a.kegiatan]);
    doc.autoTable({ head: [['Tanggal','Kelas','Mapel','Materi','Kegiatan']], body, startY: 55, styles:{fontSize:8} });
    addTandaTanganDanBarcode(doc, 'AGD-' + Date.now());
    doc.save('Jurnal_Agenda.pdf');
  });
}
