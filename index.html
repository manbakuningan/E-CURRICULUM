<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sistem Administrasi Guru</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>

<style>
:root{
  --platinum-1:#f4f6f9; --platinum-2:#e8ecf3; --glass-bg: rgba(255,255,255,.55);
  --glass-border: rgba(255,255,255,.35); --accent:#3a5aff; --accent-2:#7b3aff;
  --ink:#1c2333; --muted:#6b7385; --success:#12b76a; --warn:#f79009; --danger:#f04438;
  --sidebar-w: 264px;
}
*{box-sizing:border-box}
body{
  font-family:'Plus Jakarta Sans',sans-serif; color:var(--ink);
  background: radial-gradient(1200px 600px at 10% -10%, #e6ecff 0%, transparent 60%),
              radial-gradient(1000px 500px at 110% 10%, #ffe6f6 0%, transparent 55%),
              linear-gradient(180deg, var(--platinum-1), var(--platinum-2));
  min-height:100vh;
}
.glass{
  background: var(--glass-bg); backdrop-filter: blur(18px) saturate(160%);
  -webkit-backdrop-filter: blur(18px) saturate(160%);
  border:1px solid var(--glass-border); border-radius:18px;
  box-shadow: 0 8px 32px rgba(30,40,80,.10);
}
/* ===== LOGIN ===== */
#loginScreen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:16px;}
.login-card{width:100%; max-width:400px; padding:40px 32px;}
.login-logo{width:64px; height:64px; border-radius:16px; object-fit:cover; background:#fff;}
.form-control, .form-select{
  background: rgba(255,255,255,.6); border:1px solid rgba(0,0,0,.08); border-radius:12px; padding:11px 14px;
}
.form-control:focus, .form-select:focus{ box-shadow:0 0 0 3px rgba(58,90,255,.15); border-color:var(--accent); }
.btn-accent{
  background:linear-gradient(135deg, var(--accent), var(--accent-2)); border:none; color:#fff; border-radius:12px;
  padding:11px; font-weight:600; letter-spacing:.2px;
}
.btn-accent:hover{ filter:brightness(1.08); color:#fff; }

/* ===== APP LAYOUT ===== */
#appScreen{display:none;}
.sidebar{
  position:fixed; top:0; left:0; height:100vh; width:var(--sidebar-w); z-index:1030;
  padding:20px 14px; overflow-y:auto; border-radius:0 24px 24px 0;
  transition: transform .25s ease;
}
.sidebar-brand{display:flex; align-items:center; gap:10px; padding:8px 10px 20px;}
.sidebar-brand img{width:38px; height:38px; border-radius:10px; object-fit:cover; background:#fff;}
.sidebar-brand div{line-height:1.15;}
.nav-section{font-size:.68rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:16px 10px 6px;}
.nav-link-app{
  display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:12px; color:var(--ink);
  font-weight:500; font-size:.92rem; margin-bottom:3px; cursor:pointer; transition:.15s;
}
.nav-link-app i{width:18px; text-align:center; color:var(--muted);}
.nav-link-app:hover{ background:rgba(58,90,255,.08); }
.nav-link-app.active{ background:linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff; }
.nav-link-app.active i{ color:#fff; }

.main-wrap{ margin-left:var(--sidebar-w); min-height:100vh; padding:18px 22px 60px; transition:margin .25s ease;}
.topbar{ display:flex; align-items:center; justify-content:space-between; padding:12px 18px; margin-bottom:18px;}
.avatar{width:40px; height:40px; border-radius:50%; object-fit:cover; background:#fff; border:2px solid #fff;}
#sidebarOverlay{ position:fixed; inset:0; background:rgba(10,15,30,.35); z-index:1020; display:none; }
.burger{ display:none; }

.stat-card{ padding:20px; }
.stat-card .icon-badge{ width:46px; height:46px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; color:#fff;}
.stat-num{ font-size:1.7rem; font-weight:800; }
.progress{ height:8px; border-radius:6px; background:rgba(0,0,0,.06); }
.progress-bar{ border-radius:6px; }

.card-section{ padding:20px; margin-bottom:18px; }
.table thead th{ font-size:.75rem; text-transform:uppercase; color:var(--muted); border-bottom:2px solid rgba(0,0,0,.06); }
.table td, .table th{ vertical-align:middle; }
.badge-status{ padding:5px 10px; border-radius:8px; font-weight:600; font-size:.72rem; }
.btn-soft{ border-radius:10px; border:1px solid rgba(0,0,0,.08); background:rgba(255,255,255,.6); }
.section-title{ font-weight:700; font-size:1.05rem; margin-bottom:2px;}
.section-sub{ color:var(--muted); font-size:.85rem;}

@media (max-width: 991.98px){
  .sidebar{ transform: translateX(-100%); }
  .sidebar.show{ transform: translateX(0); }
  .main-wrap{ margin-left:0; padding:14px; }
  .burger{ display:inline-flex; }
}
.spinner-overlay{ position:fixed; inset:0; background:rgba(255,255,255,.55); backdrop-filter:blur(3px); z-index:2000; display:none; align-items:center; justify-content:center;}
.toast-container{ z-index:3000; }
.upload-drop{ border:2px dashed rgba(0,0,0,.15); border-radius:14px; padding:22px; text-align:center; cursor:pointer; background:rgba(255,255,255,.4);}
.upload-drop:hover{ border-color:var(--accent); }
.chip{ display:inline-block; padding:3px 10px; border-radius:20px; font-size:.72rem; font-weight:600;}
</style>
</head>
<body>

<!-- ============ LOADING ============ -->
<div class="spinner-overlay" id="spinnerOverlay">
  <div class="spinner-border" style="color:var(--accent); width:3rem; height:3rem;" role="status"></div>
</div>
<div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

<!-- ============ LOGIN SCREEN ============ -->
<div id="loginScreen">
  <div class="glass login-card text-center">
    <img id="loginLogo" src="https://placehold.co/64x64?text=Logo" class="login-logo mb-3" alt="Logo">
    <h5 class="fw-bold mb-0" id="loginSchoolName">Sistem Administrasi Guru</h5>
    <p class="section-sub mb-4">Silakan masuk untuk melanjutkan</p>
    <form id="formLogin" class="text-start">
      <label class="form-label small fw-semibold">Username</label>
      <input type="text" class="form-control mb-3" id="loginUsername" required autocomplete="username">
      <label class="form-label small fw-semibold">Password</label>
      <input type="password" class="form-control mb-3" id="loginPassword" required autocomplete="current-password">
      <button type="submit" class="btn btn-accent w-100 mt-2"><i class="fa-solid fa-right-to-bracket me-1"></i> Masuk</button>
      <div class="text-danger small mt-2" id="loginError"></div>
    </form>
  </div>
</div>

<!-- ============ APP SCREEN ============ -->
<div id="appScreen">
  <div id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

  <nav class="sidebar glass" id="sidebar">
    <div class="sidebar-brand">
      <img id="sbLogo" src="https://placehold.co/38x38" alt="logo">
      <div>
        <div class="fw-bold small" id="sbSchoolName">Sekolah</div>
        <div class="section-sub" style="font-size:.72rem;" id="sbTapel">Tahun Ajaran</div>
      </div>
    </div>

    <div id="navMenu"></div>
  </nav>

  <div class="main-wrap" id="mainWrap">
    <div class="topbar glass">
      <div class="d-flex align-items-center gap-2">
        <button class="btn burger btn-soft" onclick="toggleSidebar(true)"><i class="fa-solid fa-bars"></i></button>
        <div>
          <div class="fw-bold" id="pageTitle">Dashboard</div>
          <div class="section-sub" id="pageSub">Ringkasan sistem</div>
        </div>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="chip" id="onlineChip" style="background:#12b76a20; color:#12b76a;"><i class="fa-solid fa-circle" style="font-size:6px;"></i> Online</span>
        <button class="btn btn-soft btn-sm" onclick="syncAllTables()" title="Sinkronkan data"><i class="fa-solid fa-arrows-rotate"></i></button>
        <img class="avatar" id="topAvatar" src="https://placehold.co/40x40" alt="avatar">
        <div class="d-none d-sm-block me-2">
          <div class="fw-semibold small" id="topUserName">-</div>
          <div class="section-sub" style="font-size:.72rem;" id="topUserRole">-</div>
        </div>
        <button class="btn btn-soft btn-sm" onclick="logout()"><i class="fa-solid fa-power-off"></i></button>
      </div>
    </div>

    <div id="pageContent"></div>
  </div>
</div>

<script>
/*************************************************************
 * KONFIGURASI API
 *************************************************************/
const API_URL = "https://script.google.com/macros/s/AKfycbzxGDSOO9XqZFoyUWXthC6-xd3oqcSOswlBZflvcnVkzPGJ8DDWouSGAO5uoL_NilkAjQ/exec"; // <-- Ganti dengan URL Web App hasil deploy Kode.gs

let STATE = {
  token: localStorage.getItem('sag_token') || null,
  user: JSON.parse(localStorage.getItem('sag_user') || 'null'),
  config: {},
  currentPage: 'dashboard',
  isOnline: navigator.onLine
};

/*************************************************************
 * OFFLINE-FIRST DATA STORE (localStorage)
 * Semua tabel disimpan lokal. Baca selalu dari local dulu (instan),
 * lalu sync ke server di background dan update local store.
 * Kalau ada perubahan manual di Google Sheet, akan kebaca saat sync berikutnya.
 *************************************************************/
const DB_PREFIX = 'sag_db_';
function dbGet(table) {
  try { return JSON.parse(localStorage.getItem(DB_PREFIX + table) || '[]'); }
  catch (e) { return []; }
}
function dbSet(table, rows) {
  try { localStorage.setItem(DB_PREFIX + table, JSON.stringify(rows)); } catch (e) { /* storage penuh, abaikan */ }
}
function dbUpsert(table, row) {
  const rows = dbGet(table);
  const idx = rows.findIndex(r => r.id === row.id);
  if (idx === -1) rows.push(row); else rows[idx] = row;
  dbSet(table, rows);
}
function dbDelete(table, id) {
  dbSet(table, dbGet(table).filter(r => r.id !== id));
}

// Ambil data: instan dari local, lalu refresh diam-diam dari server (kalau online)
function getData(table, filterFn) {
  const local = dbGet(table);
  syncTable(table); // background, tidak di-await oleh pemanggil
  return filterFn ? local.filter(filterFn) : local;
}

async function syncTable(table) {
  if (!navigator.onLine) return;
  const res = await apiCall('getAll', { table }, true);
  if (res.success) {
    dbSet(table, res.data);
    // Kalau lagi ada di halaman yg pakai tabel ini, refresh tampilan diam-diam
    if (STATE._syncRefreshPages && STATE._syncRefreshPages[table] === STATE.currentPage) {
      navigate(STATE.currentPage);
    }
  }
}

async function syncAllTables() {
  const tables = ['Config','Users','Kelas','Mapel','DataSiswa','Absensi','Nilai','Agenda','BimbinganWali','JadwalMengajar','PerangkatAjar','PanduanMengajar'];
  showToast(navigator.onLine ? 'Menyinkronkan data...' : 'Offline - pakai data tersimpan', navigator.onLine ? 'primary' : 'warning');
  for (const t of tables) { await syncTable(t); }
  showToast('Data tersinkron.', 'success');
  await loadConfig();
  navigate(STATE.currentPage);
}

window.addEventListener('online', () => { STATE.isOnline = true; updateOnlineChip(); showToast('Kembali online, menyinkronkan...', 'success'); syncAllTables(); });
window.addEventListener('offline', () => { STATE.isOnline = false; updateOnlineChip(); showToast('Mode offline - perubahan akan disinkron saat online kembali.', 'warning'); });
function updateOnlineChip() {
  const el = document.getElementById('onlineChip'); if (!el) return;
  el.style.background = STATE.isOnline ? '#12b76a20' : '#f0443820';
  el.style.color = STATE.isOnline ? '#12b76a' : '#f04438';
  el.innerHTML = `<i class="fa-solid fa-circle" style="font-size:6px;"></i> ${STATE.isOnline ? 'Online' : 'Offline'}`;
}

/*************************************************************
 * HTTP HELPER
 *************************************************************/
async function apiCall(action, payload = {}, silent = false) {
  if (!silent) showSpinner(true);
  try {
    const body = Object.assign({ action, token: STATE.token }, payload);
    const res = await fetch(API_URL, {
      method: 'POST', // GAS doPost menangani semua; method GET juga didukung via query jika perlu
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // hindari preflight CORS
      body: JSON.stringify(body)
    });
    const json = await res.json();
    if (!json.success) {
      showToast(json.message || 'Terjadi kesalahan.', 'danger');
    }
    return json;
  } catch (err) {
    showToast('Gagal terhubung ke server: ' + err.message, 'danger');
    return { success: false, message: err.message };
  } finally {
    if (!silent) showSpinner(false);
  }
}

function showSpinner(show) {
  document.getElementById('spinnerOverlay').style.display = show ? 'flex' : 'none';
}
function showToast(msg, type = 'primary') {
  const id = 't' + Date.now();
  const html = `<div id="${id}" class="toast align-items-center text-bg-${type} border-0" role="alert">
    <div class="d-flex"><div class="toast-body">${msg}</div>
    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`;
  document.getElementById('toastContainer').insertAdjacentHTML('beforeend', html);
  const el = new bootstrap.Toast(document.getElementById(id), { delay: 3500 });
  el.show();
}

/*************************************************************
 * AUTH
 *************************************************************/
document.getElementById('formLogin').addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById('loginError').textContent = '';
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const res = await apiCall('login', { username, password });
  if (res.success) {
    STATE.token = res.token; STATE.user = res.user;
    localStorage.setItem('sag_token', res.token);
    localStorage.setItem('sag_user', JSON.stringify(res.user));
    await bootApp();
  } else {
    document.getElementById('loginError').textContent = res.message;
  }
});

function logout() {
  localStorage.removeItem('sag_token'); localStorage.removeItem('sag_user');
  STATE.token = null; STATE.user = null;
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

async function loadConfig() {
  const local = getData('Config'); // instan dari local, sync jalan di background lewat getData()
  if (local.length) {
    const cfg = {};
    local.forEach(r => cfg[r.key] = r.value);
    STATE.config = cfg;
    const logo = cfg.logoUrl || 'https://placehold.co/64x64?text=Logo';
    document.getElementById('loginLogo').src = logo;
    document.getElementById('loginSchoolName').textContent = cfg.namaSekolah || 'Sistem Administrasi Guru';
    document.getElementById('sbLogo').src = logo;
    document.getElementById('sbSchoolName').textContent = cfg.namaSekolah || '-';
    document.getElementById('sbTapel').textContent = (cfg.tapelAktif || '-') + ' • ' + (cfg.semesterAktif || '-');
  }
}

/*************************************************************
 * BOOT
 *************************************************************/
window.addEventListener('DOMContentLoaded', async () => {
  if (STATE.token && STATE.user) {
    document.getElementById('loginScreen').style.display = 'none';
    await bootApp();
  }
});

async function bootApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';

  // Render UI langsung pakai data lokal dulu (instan), config & dashboard nyusul di background
  document.getElementById('topUserName').textContent = STATE.user.nama;
  document.getElementById('topUserRole').textContent = STATE.user.role;
  renderMenu();
  updateOnlineChip();
  navigate('dashboard');

  await loadConfig();
  document.getElementById('topAvatar').src = STATE.config.logoUrl || 'https://placehold.co/40x40';

  if (navigator.onLine) syncAllTables();
}

// Daftarkan service worker supaya app shell (HTML/CSS/JS) bisa dibuka tanpa internet
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => { /* sw.js opsional, abaikan kalau tidak ada */ });
  });
}

/*************************************************************
 * SIDEBAR / MENU
 *************************************************************/
const MENU_GURU = [
  { section: 'Menu Guru' },
  { id: 'dashboard', label: 'Dashboard', icon: 'fa-gauge-high' },
  { id: 'absensi', label: 'Input Absensi', icon: 'fa-clipboard-check' },
  { id: 'nilai', label: 'Input Penilaian', icon: 'fa-marker' },
  { id: 'jadwal', label: 'Jadwal Mengajar', icon: 'fa-calendar-days' },
  { id: 'agenda', label: 'Jurnal Agenda', icon: 'fa-book-open' },
  { id: 'bimbingan', label: 'Bimbingan Wali', icon: 'fa-hands-holding-child' },
  { id: 'perangkat', label: 'E-Perangkat Ajar', icon: 'fa-file-arrow-up' },
  { id: 'panduan', label: 'Panduan Mengajar', icon: 'fa-book' },
];
const MENU_ADMIN = [
  { section: 'Menu Admin' },
  { id: 'rekapWali', label: 'Rekap Guru Wali', icon: 'fa-people-roof' },
  { id: 'userManagement', label: 'Manajemen User', icon: 'fa-users-gear' },
  { id: 'importSiswa', label: 'Import Siswa Massal', icon: 'fa-file-import' },
  { id: 'konfigurasi', label: 'Konfigurasi Sekolah', icon: 'fa-gear' },
  { id: 'monitoringPerangkat', label: 'Validasi & Monitoring', icon: 'fa-clipboard-list' },
];

function renderMenu() {
  const isAdmin = STATE.user.role === 'Admin';
  let items = MENU_GURU.slice();
  if (isAdmin) items = items.concat(MENU_ADMIN);

  let html = '';
  items.forEach(item => {
    if (item.section) { html += `<div class="nav-section">${item.section}</div>`; return; }
    html += `<div class="nav-link-app" data-page="${item.id}" onclick="navigate('${item.id}')">
      <i class="fa-solid ${item.icon}"></i><span>${item.label}</span></div>`;
  });
  document.getElementById('navMenu').innerHTML = html;
}

function toggleSidebar(show) {
  document.getElementById('sidebar').classList.toggle('show', show);
  document.getElementById('sidebarOverlay').style.display = show ? 'block' : 'none';
}

const PAGE_TITLES = {
  dashboard: ['Dashboard', 'Ringkasan sistem administrasi'],
  absensi: ['Input Absensi', 'Catat kehadiran siswa per kelas'],
  nilai: ['Input Penilaian', 'Leger nilai dinamis & riwayat'],
  jadwal: ['Jadwal Mengajar', 'Jadwal mengajar mingguan'],
  agenda: ['Jurnal Agenda', 'Catatan kegiatan pembelajaran harian'],
  bimbingan: ['Bimbingan Wali', 'Catatan bimbingan siswa'],
  perangkat: ['E-Perangkat Ajar', 'Upload & kelola perangkat ajar'],
  panduan: ['Panduan Mengajar', 'Repositori buku & regulasi'],
  rekapWali: ['Rekap Guru Wali', 'Rekapitulasi wali kelas'],
  userManagement: ['Manajemen User', 'Tambah / hapus pengguna'],
  importSiswa: ['Import Siswa Massal', 'Import data siswa via CSV'],
  konfigurasi: ['Konfigurasi Sekolah', 'Identitas & pengaturan sekolah'],
  monitoringPerangkat: ['Validasi & Monitoring', 'Supervisi kelengkapan administrasi guru'],
};

async function navigate(page) {
  STATE.currentPage = page;
  document.querySelectorAll('.nav-link-app').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  document.getElementById('pageTitle').textContent = PAGE_TITLES[page][0];
  document.getElementById('pageSub').textContent = PAGE_TITLES[page][1];
  toggleSidebar(false);

  const renderers = {
    dashboard: renderDashboard,
    absensi: renderAbsensi,
    nilai: renderNilai,
    jadwal: renderGenericTable.bind(null, 'JadwalMengajar', jadwalColumns()),
    agenda: renderGenericTable.bind(null, 'Agenda', agendaColumns()),
    bimbingan: renderGenericTable.bind(null, 'BimbinganWali', bimbinganColumns()),
    perangkat: renderPerangkat,
    panduan: renderPanduan,
    rekapWali: renderRekapWali,
    userManagement: renderUserManagement,
    importSiswa: renderImportSiswa,
    konfigurasi: renderKonfigurasi,
    monitoringPerangkat: renderMonitoringPerangkat,
  };
  document.getElementById('pageContent').innerHTML = '<div class="text-center py-5 section-sub">Memuat...</div>';
  if (renderers[page]) await renderers[page]();
}

/*************************************************************
 * DASHBOARD
 *************************************************************/
async function renderDashboard() {
  const kelas = getData('Kelas');
  const users = getData('Users');
  const siswa = getData('DataSiswa');
  const perangkat = getData('PerangkatAjar');

  const jenisWajib = ['Silabus', 'ATP', 'Prota', 'Promes', 'Modul Ajar/RPP', 'KKTP'];
  const guruList = users.filter(u => u.role === 'Guru');
  const kelengkapan = guruList.map(g => {
    const milikGuru = perangkat.filter(p => p.guruId === g.id);
    const jenisTerisi = jenisWajib.filter(j => milikGuru.some(p => p.jenis === j && p.status !== 'Ditolak'));
    const persentase = Math.round((jenisTerisi.length / jenisWajib.length) * 100);
    return { nama: g.nama, persentase, terisi: jenisTerisi.length, total: jenisWajib.length };
  });
  const rataRata = kelengkapan.length ? Math.round(kelengkapan.reduce((a,b) => a+b.persentase, 0) / kelengkapan.length) : 0;
  const d = { jumlahRombel: kelas.length, jumlahGuru: guruList.length,
    jumlahSiswa: siswa.filter(s => s.status === 'Aktif' || s.status === '').length,
    rataRataKelengkapan: rataRata, kelengkapanPerGuru: kelengkapan };

  let barsHtml = d.kelengkapanPerGuru.map(g => `
    <div class="mb-3">
      <div class="d-flex justify-content-between small mb-1">
        <span class="fw-semibold">${g.nama}</span><span class="text-muted">${g.terisi}/${g.total} (${g.persentase}%)</span>
      </div>
      <div class="progress"><div class="progress-bar" style="width:${g.persentase}%; background:${g.persentase>=80?'var(--success)':g.persentase>=50?'var(--warn)':'var(--danger)'}"></div></div>
    </div>`).join('') || '<p class="section-sub">Belum ada data guru.</p>';

  document.getElementById('pageContent').innerHTML = `
    <div class="row g-3 mb-3">

/*************************************************************
 * ANTRIAN OFFLINE (untuk create/update/delete saat tidak ada koneksi)
 *************************************************************/
function getQueue() { try { return JSON.parse(localStorage.getItem('sag_queue') || '[]'); } catch (e) { return []; } }
function setQueue(q) { localStorage.setItem('sag_queue', JSON.stringify(q)); }
function queueAction(action, payload) {
  const q = getQueue(); q.push({ action, payload, time: Date.now() }); setQueue(q);
}
async function processQueue() {
  if (!navigator.onLine) return;
  let q = getQueue();
  if (!q.length) return;
  showToast('Mengirim ' + q.length + ' perubahan tertunda...', 'primary');
  while (q.length) {
    const item = q.shift();
    await apiCall(item.action, item.payload, true);
    setQueue(q);
  }
  showToast('Semua perubahan tersinkron.', 'success');
  syncAllTables();
}
window.addEventListener('online', processQueue);

// Simpan/hapus data: langsung update local store (instan) + kirim ke server (atau antri kalau offline)
async function writeData(action, table, data, id) {
  if (action === 'create' || action === 'update') {
    if (!data.id) data.id = id || (table.substring(0,3).toUpperCase() + '-' + Date.now());
    dbUpsert(table, data);
  }
  if (action === 'delete') dbDelete(table, id);

  if (navigator.onLine) {
    await apiCall(action, action === 'delete' ? { table, id } : { table, data }, true);
  } else {
    queueAction(action, action === 'delete' ? { table, id } : { table, data });
  }
}

async function submitUploadPerangkat(jenis) {
  const file = document.getElementById('fileInput').files[0];
  if (!file) { showToast('Pilih file terlebih dahulu.', 'warning'); return; }
  const base64 = await fileToBase64(file);
  const res = await apiCall('uploadFile', {
    table: 'PerangkatAjar', fileData: base64, fileName: file.name, mimeType: file.type,
    data: { guruId: STATE.user.id, jenis, tapel: STATE.config.tapelAktif || '' }
  });
  if (res.success) {
    showToast('Berhasil diupload.', 'success');
    bootstrap.Modal.getInstance(document.getElementById('uploadModal')).hide();
    renderPerangkat();
  }
}
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

 *************************************************************/
async function renderUserManagement() {
  const rows = getData('Users').map(u => `<tr>
    <td>${u.nama}</td><td>${u.username}</td><td>${u.role}</td><td><span class="chip" style="background:${u.status==='Aktif'?'#12b76a20':'#f0443820'}; color:${u.status==='Aktif'?'#12b76a':'#f04438'}">${u.status}</span></td>
    <td class="text-end"><button class="btn btn-sm btn-soft" onclick="resetPasswordUser('${u.id}')"><i class="fa-solid fa-key"></i></button>
    <button class="btn btn-sm btn-soft text-danger" onclick="deleteRow('Users','${u.id}')"><i class="fa-solid fa-trash"></i></button></td></tr>`).join('');

  document.getElementById('pageContent').innerHTML = `
    <div class="glass card-section">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="section-title">Manajemen User</div>
        <button class="btn btn-accent btn-sm" onclick="openTambahUser()"><i class="fa-solid fa-user-plus me-1"></i>Tambah User</button>
      </div>
      <div class="table-responsive"><table class="table table-sm">
      <thead><tr><th>Nama</th><th>Username</th><th>Role</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows || '<tr><td colspan="5" class="text-center py-3 section-sub">Belum ada user.</td></tr>'}</tbody></table></div>
    </div>`;
}
function openTambahUser() {
  const modalHtml = `<div class="modal fade" id="userModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content glass">
    <div class="modal-header"><h6 class="modal-title">Tambah User</h6><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <input class="form-control form-control-sm mb-2" id="usNama" placeholder="Nama Lengkap">
      <input class="form-control form-control-sm mb-2" id="usUsername" placeholder="Username">
      <input class="form-control form-control-sm mb-2" id="usPassword" placeholder="Password" type="password">
      <select class="form-select form-select-sm mb-2" id="usRole"><option value="Guru">Guru</option><option value="Admin">Admin</option></select>
      <input class="form-control form-control-sm mb-2" id="usNip" placeholder="NIP (opsional)">
    </div>
    <div class="modal-footer"><button class="btn btn-accent btn-sm" onclick="submitTambahUser()">Simpan</button></div>
  </div></div></div>`;
  document.getElementById('userModalHolder')?.remove();
  const holder = document.createElement('div'); holder.id = 'userModalHolder'; holder.innerHTML = modalHtml;
  document.body.appendChild(holder);
  new bootstrap.Modal(document.getElementById('userModal')).show();
}
async function submitTambahUser() {
  const data = {
    nama: document.getElementById('usNama').value, username: document.getElementById('usUsername').value,
    password: document.getElementById('usPassword').value, role: document.getElementById('usRole').value,
    nip: document.getElementById('usNip').value, status: 'Aktif'
  };
  const res = await apiCall('manageUser', { sub: 'add', data });
  if (res.success) { showToast('User ditambahkan.', 'success'); bootstrap.Modal.getInstance(document.getElementById('userModal')).hide(); renderUserManagement(); }
}
async function resetPasswordUser(id) {
  const pw = prompt('Masukkan password baru:');
  if (!pw) return;
  const res = await apiCall('manageUser', { sub: 'resetPassword', id, newPassword: pw });
  if (res.success) showToast('Password direset.', 'success');
}

/*************************************************************
 * ADMIN: IMPORT SISWA MASSAL (CSV)
 *************************************************************/
async function renderImportSiswa() {
  const kelasList = getData('Kelas');
  document.getElementById('pageContent').innerHTML = `
    <div class="glass card-section">
      <div class="section-title mb-2">Import Data Siswa (CSV)</div>
      <p class="section-sub small">Format kolom CSV: <code>nis,nisn,nama,jenisKelamin,kelasId</code>. Kelas tersedia: ${kelasList.map(k=>k.id+' ('+k.namaKelas+')').join(', ') || '-'}</p>
      <input type="file" class="form-control form-control-sm mb-3" id="csvFile" accept=".csv">
      <button class="btn btn-accent btn-sm" onclick="prosesImportCsv()"><i class="fa-solid fa-upload me-1"></i>Proses Import</button>
      <div id="importPreview" class="mt-3"></div>
    </div>`;
}
function prosesImportCsv() {
  const file = document.getElementById('csvFile').files[0];
  if (!file) { showToast('Pilih file CSV.', 'warning'); return; }
  const reader = new FileReader();
  reader.onload = async (e) => {
    const lines = e.target.result.split('\n').map(l => l.trim()).filter(Boolean);
    const headers = lines[0].split(',').map(h => h.trim());
    const rows = lines.slice(1).map(line => {
      const vals = line.split(',');
      const obj = {}; headers.forEach((h, i) => obj[h] = (vals[i]||'').trim());
      obj.status = 'Aktif';
      return obj;
    });
    document.getElementById('importPreview').innerHTML = `<p class="small section-sub">${rows.length} baris siap diimport.</p>`;
    const res = await apiCall('bulkCreate', { table: 'DataSiswa', rows });
    if (res.success) showToast(res.message, 'success');
  };
  reader.readAsText(file);
}

/*************************************************************
 * ADMIN: KONFIGURASI SEKOLAH
 *************************************************************/
async function renderKonfigurasi() {
  const cfg = {}; getData('Config').forEach(r => cfg[r.key] = r.value);

  const fields = ['namaSekolah','alamatSekolah','npsn','kepsekNama','kepsekNip','logoUrl','tapelAktif','semesterAktif'];
  const labels = {namaSekolah:'Nama Sekolah', alamatSekolah:'Alamat', npsn:'NPSN', kepsekNama:'Nama Kepala Sekolah',
    kepsekNip:'NIP Kepala Sekolah', logoUrl:'URL Logo Sekolah', tapelAktif:'Tahun Ajaran Aktif', semesterAktif:'Semester Aktif'};

  const html = fields.map(f => `
    <div class="mb-2"><label class="form-label small fw-semibold">${labels[f]}</label>
    <input class="form-control form-control-sm" id="cfg_${f}" value="${cfg[f]||''}"></div>`).join('');

  document.getElementById('pageContent').innerHTML = `
    <div class="glass card-section" style="max-width:560px;">
      <div class="section-title mb-3">Konfigurasi Sekolah</div>
      ${html}

    </div>`;
}
async function simpanKonfigurasi() {
  const fields = ['namaSekolah','alamatSekolah','npsn','kepsekNama','kepsekNip','logoUrl','tapelAktif','semesterAktif'];
  const data = {};
  fields.forEach(f => data[f] = document.getElementById('cfg_' + f).value);

  // 1x request untuk semua field (sebelumnya 8x request berurutan -> lambat)
  const res = await apiCall('bulkUpdateConfig', { data });
  if (res.success) { showToast('Konfigurasi disimpan.', 'success'); await loadConfig(); }
}

  const rows = (res.data || []).map(p => `<tr>

    <td class="text-end">
      <button class="btn btn-sm btn-soft text-success" onclick="setStatusPerangkat('${p.id}','Disetujui')"><i class="fa-solid fa-check"></i></button>
      <button class="btn btn-sm btn-soft text-warning" onclick="setStatusPerangkat('${p.id}','Revisi')"><i class="fa-solid fa-rotate-left"></i></button>
      <button class="btn btn-sm btn-soft text-danger" onclick="setStatusPerangkat('${p.id}','Ditolak')"><i class="fa-solid fa-xmark"></i></button>
    </td></tr>`).join('');

  document.getElementById('pageContent').innerHTML = `
    <div class="glass card-section">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="section-title">Validasi & Monitoring Perangkat Ajar</div>
        <button class="btn btn-soft btn-sm" onclick="printLembarKontrol()"><i class="fa-solid fa-print me-1"></i>Cetak Lembar Kontrol</button>
      </div>
      <div class="table-responsive"><table class="table table-sm">
      <thead><tr><th>Guru</th><th>Jenis</th><th>File</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows || '<tr><td colspan="5" class="text-center py-3 section-sub">Belum ada dokumen.</td></tr>'}</tbody></table></div>

async function setStatusPerangkat(id, status) {
  let catatan = '';
  if (status === 'Revisi' || status === 'Ditolak') catatan = prompt('Catatan revisi/penolakan:') || '';
  const res = await apiCall('validasiPerangkat', { id, status, catatan });
  if (res.success) { showToast('Status diperbarui.', 'success'); renderMonitoringPerangkat(); }
}
function printLembarKontrol() {
  printWithHeader('Lembar Kontrol', () => {
    const doc = new jspdf.jsPDF();
    addKopSurat(doc, 'LEMBAR KONTROL KELENGKAPAN ADMINISTRASI GURU');
    const body = (window._monitoringData||[]).map(p => [p.guruNama, p.jenis, p.status, p.catatanRevisi||'-']);
    doc.autoTable({ head: [['Guru','Jenis Dokumen','Status','Catatan']], body, startY: 55 });
    addTandaTanganDanBarcode(doc, 'LK-' + Date.now());
    doc.save('Lembar_Kontrol_Administrasi.pdf');
  });
}

/*************************************************************
 * PDF UTILITIES (KOP SURAT, TTD, BARCODE)
 *************************************************************/
function printWithHeader(label, fn) {
  try { fn(); } catch (err) { showToast('Gagal membuat PDF: ' + err.message, 'danger'); }
}
function addKopSurat(doc, judul) {
  const cfg = STATE.config;
  doc.setFontSize(13); doc.setFont(undefined, 'bold');
  doc.text(cfg.namaSekolah || 'Nama Sekolah', 40, 18);
  doc.setFontSize(9); doc.setFont(undefined, 'normal');
  doc.text(cfg.alamatSekolah || '-', 40, 24);
  doc.text('NPSN: ' + (cfg.npsn || '-'), 40, 29);
  doc.setLineWidth(0.8); doc.line(14, 34, 196, 34);

  doc.setFontSize(12); doc.setFont(undefined, 'bold'); doc.text(judul, 105, 44, { align: 'center' });
  doc.setFontSize(9); doc.setFont(undefined, 'normal');
  doc.text('Tahun Ajaran: ' + (cfg.tapelAktif || '-') + '  |  Semester: ' + (cfg.semesterAktif || '-'), 105, 50, { align: 'center' });
}
function addTandaTanganDanBarcode(doc, code) {
  const cfg = STATE.config;
  const finalY = doc.lastAutoTable ? doc.lastAutoTable.finalY + 20 : 120;
  doc.setFontSize(9);
  doc.text('Kuningan, ' + new Date().toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' }), 140, finalY);
  doc.text('Mengetahui,', 140, finalY + 6);
  doc.text('Kepala Sekolah', 140, finalY + 12);
  doc.text(cfg.kepsekNama || '(.....................)', 140, finalY + 32);
  doc.text('NIP. ' + (cfg.kepsekNip || '-'), 140, finalY + 37);

  const canvas = document.createElement('canvas');
  try {
    JsBarcode(canvas, code, { format: 'CODE128', displayValue: false, height: 30 });
    const imgData = canvas.toDataURL('image/png');
    doc.addImage(imgData, 'PNG', 14, finalY, 45, 14);
    doc.setFontSize(7); doc.text(code, 14, finalY + 18);
  } catch (e) { /* barcode gagal, abaikan */ }
}
